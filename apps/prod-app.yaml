apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-18-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_USERNAME/task-18.git'
    targetRevision: HEAD
    path: prod
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true